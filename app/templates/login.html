{% extends "base.html" %}
{% block title %}Login — PinFlow{% endblock %}

{% block body %}
<div class="auth-page">

  <div class="auth-card">
    <h1>Welcome Back</h1>

    <div id="auth-error" class="auth-error hidden"></div>

    <form id="login-form">

      <div class="field-group">
        <input type="email" id="email" placeholder="Email" required />
      </div>

      <div class="field-group password-group">
        <input type="password" id="password" placeholder="Password" required />
        <button type="button" id="toggle-pass">👁</button>
      </div>

      <button class="btn-primary btn-full">Login</button>

    </form>

    <p class="auth-switch">
      No account? <a href="{{ url_for('auth.signup') }}">Signup</a>
    </p>
  </div>

</div>

<script>
document.getElementById("toggle-pass").onclick = () => {
  const p = document.getElementById("password");
  p.type = p.type === "password" ? "text" : "password";
};
</script>

{% endblock %}
