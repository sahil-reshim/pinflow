<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PinFlow AI{% endblock %}</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />

  {% block head %}{% endblock %}
</head>

<body>

<!-- Global Loader -->
<div id="global-loader" class="global-loader hidden">
  <div class="loader-ring"></div>
</div>

<!-- Toast -->
<div id="toast-container"></div>

{% block body %}{% endblock %}

<script src="{{ url_for('static', filename='script.js') }}"></script>
{% block scripts %}{% endblock %}

</body>
</html>
